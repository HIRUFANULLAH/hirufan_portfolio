<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6d4aff"/>
      <stop offset="1" stop-color="#00b8e6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#g1)"/>
  <circle cx="120" cy="80" r="160" fill="#ffffff" opacity="0.08"/>
  <circle cx="700" cy="430" r="200" fill="#ffffff" opacity="0.07"/>
  <g fill="none" stroke="#ffffff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round">
    <!-- phone -->
    <rect x="305" y="120" width="190" height="270" rx="26" fill="#ffffff" fill-opacity="0.1"/>
    <line x1="365" y1="150" x2="435" y2="150" stroke-width="9"/>
    <!-- receipt / order lines -->
    <line x1="340" y1="205" x2="460" y2="205"/>
    <line x1="340" y1="245" x2="460" y2="245"/>
    <line x1="340" y1="285" x2="420" y2="285"/>
    <!-- total bar -->
    <rect x="335" y="320" width="130" height="36" rx="10" fill="#ffffff" fill-opacity="0.18" stroke="none"/>
  </g>
  <!-- card / payment -->
  <g transform="rotate(-12 560 300)">
    <rect x="490" y="260" width="150" height="96" rx="14" fill="#ffffff" fill-opacity="0.92"/>
    <rect x="505" y="285" width="44" height="30" rx="6" fill="#6d4aff"/>
    <line x1="505" y1="335" x2="625" y2="335" stroke="#6d4aff" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
